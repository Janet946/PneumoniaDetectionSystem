{% extends "base.html" %}
{% block content %}
<section class="card">
  <h1>Login</h1>
  <p class="muted">Administrator access to dashboard, scanning and reports.</p>

  {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
  {% endif %}

  <form method="post" action="/login" class="form">
    <label class="label">Username</label>
    <input class="input" type="text" name="username" required>

    <label class="label">Password</label>
    <input class="input" type="password" name="password" required>

    <div class="actions">
      <button class="btn btn-primary" type="submit">Login</button>
    </div>
  </form>

  <div class="fineprint">
    <p>Demo credentials (change later):</p>
    <ul style="list-style: none; padding: 0;">
      <li><code>admin</code> / <code>admin123</code></li>
      <li><code>dr_dube</code> / <code>dube@2024</code></li>
      <li><code>dr_moyo</code> / <code>moyo@2024</code></li>
      <li><code>dr_sibanda</code> / <code>sibanda@2024</code></li>
    </ul>
  </div>
</section>
{% endblock %}
